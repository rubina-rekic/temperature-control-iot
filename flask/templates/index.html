<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Temperaturna regulacija</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 40px auto;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }
        h1, h2 { text-align: center; }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
        }
        form { margin-top: 20px; }
        input[type=number], button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        input[type=submit], button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover, input[type=submit]:hover {
            background: #0056b3;
        }
        hr { margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Temperaturna regulacija</h1>
    <div class="status">
        <h2>Trenutna temperatura: {{ temperature if temperature is not none else "N/A" }} °C</h2>
        <h2>Zadana temperatura: {{ set_temp }} °C</h2>
    </div>
    <form method="POST">
        <label for="new_temp">Nova zadana temperatura:</label>
        <input type="number" name="new_temp" step="0.1" min="0" required>
        <input type="submit" value="Postavi">
    </form>
    <hr>
</body>
</html>
